<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile User</title>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://stymmythxvfhtfxdvcag.supabase.co",
"sb_publishable_SlQWfTzw1vqLS78Acs5EPQ_ww-bYyqM"
);

window.supabase = supabase;
</script>

<style>
:root{
    --primary:#e60023;
    --white:#fff;
}

body{
    margin:0;
    font-family:sans-serif;
    background:var(--primary);
}

.container{padding:20px}

.card{
    background:var(--white);
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin:auto;
    display:block;
    border:4px solid var(--primary);
}

.info{margin-top:10px}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover{opacity:.85}

.back{
    background:black;
}

.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,.5);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<button class="back" onclick="back()">⬅ Kembali</button>

<div class="card">

<img id="foto" class="profile-img">

<h3 id="nama"></h3>

<div class="info">Alamat: <span id="alamat"></span></div>
<div class="info">No WA: <span id="wa"></span></div>
<div class="info">Terdaftar: <span id="tanggal"></span></div>

<button onclick="openPassword()">GANTI PASSWORD</button>
<button onclick="logout()">LOGOUT</button>

</div>
</div>

<!-- MODAL UMUM -->
<div id="modal" class="modal">
<div class="modal-content">
<p id="modalText"></p>
<button onclick="closeModal()">OK</button>
</div>
</div>

<!-- MODAL PASSWORD -->
<div id="modalPass" class="modal">
<div class="modal-content">
<h3>Ganti Password</h3>

<input id="old_pass" type="password" placeholder="Password Lama">
<input id="new_pass" type="password" placeholder="Password Baru">
<input id="new_pass2" type="password" placeholder="Ulangi Password Baru">

<button onclick="changePassword()">SIMPAN</button>
<button onclick="closePassword()">BATAL</button>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async ()=>{

const token = localStorage.getItem("token")

if(!token){
    location.href="index.html"
    return
}

const { data } = await supabase.rpc("cek_session",{p_token:token})

if(!data || data.length===0 || data[0].role !== "user"){
    localStorage.removeItem("token")
    location.href="index.html"
    return
}

loadUser(data[0].user_id)

})

function showModal(msg){
    document.getElementById("modalText").innerText = msg
    document.getElementById("modal").style.display="flex"
}

function closeModal(){
    document.getElementById("modal").style.display="none"
}

async function loadUser(id){
    const { data } = await supabase
    .from("users")
    .select("*")
    .eq("id",id)
    .maybeSingle()

    document.getElementById("nama").innerText = data.nama
    document.getElementById("alamat").innerText = data.alamat
    document.getElementById("wa").innerText = data.no_wa
    document.getElementById("tanggal").innerText =
        new Date(data.created_at).toLocaleDateString()

    const url = supabase.storage
        .from("data-ojek")
        .getPublicUrl(data.foto).data.publicUrl

    document.getElementById("foto").src = url
}

function back(){
    location.href="index.html"
}

function openPassword(){
    document.getElementById("modalPass").style.display="flex"
}

function closePassword(){
    document.getElementById("modalPass").style.display="none"
}

async function changePassword(){
    const oldPass = old_pass.value.trim()
    const newPass = new_pass.value.trim()
    const newPass2 = new_pass2.value.trim()

    if(!oldPass || !newPass || !newPass2){
        showModal("Semua field wajib diisi")
        return
    }

    if(newPass !== newPass2){
        showModal("Password baru tidak sama")
        return
    }

    const token = localStorage.getItem("token")
    const { data } = await supabase.rpc("cek_session",{p_token:token})

    const userId = data[0].user_id

    const { data:user } = await supabase
    .from("users")
    .select("password")
    .eq("id",userId)
    .maybeSingle()

    if(user.password !== oldPass){
        showModal("Password lama salah")
        return
    }

    await supabase
    .from("users")
    .update({ password:newPass })
    .eq("id",userId)

    showModal("Password berhasil diganti")
    closePassword()
}

async function logout(){
    const token = localStorage.getItem("token")
    await supabase.rpc("logout_session",{p_token:token})
    localStorage.removeItem("token")
    location.href="index.html"
}
</script>

</body>
</html>
