<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User</title>

<script type="module">
import { supabase } from './supabaseClient.js'
window.supabase = supabase
</script>

<style>
:root{
    --primary:#e60023;
    --bg:#f5f5f5;
    --white:#fff;
}

body{
    margin:0;
    font-family:sans-serif;
    background:var(--primary);
}

.hidden{display:none}

.logo{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{padding:20px}

.card{
    background:var(--white);
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:12px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover{opacity:.85}
button:disabled{background:#ccc}

.link{
    text-align:center;
    margin-top:10px;
    color:var(--primary);
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.header{
    color:white;
    font-weight:bold;
    margin-bottom:10px;
}

.map{
    margin-top:15px;
    height:200px;
    border-radius:15px;
    overflow:hidden;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,.5);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}
</style>
</head>

<body>

<div id="logo" class="logo">
    <img src="Emblem_motorbike_ONAR_dengan_bendera_Indonesia-removebg-preview.png" alt="Logo ONAR">
</div>

<div id="login" class="container hidden">
<div class="card">
<h3>Login User</h3>

<input id="login_wa" placeholder="No WA">
<input id="login_pass" type="password" placeholder="Password">

<button id="btnLogin" onclick="login()">LOGIN</button>

<div class="link" onclick="showRegister()">Belum punya akun? Daftar</div>
<div class="link" onclick="bantuan()">Pusat Bantuan</div>
</div>
</div>

<div id="register" class="container hidden">
<div class="card">
<h3>Daftar User</h3>

<input id="r_nama" placeholder="Nama">
<input id="r_alamat" placeholder="Alamat">
<input id="r_wa" placeholder="No WA">
<input id="r_pass" type="password" placeholder="Password">

<p>Upload Foto Selfie</p>
<input type="file" id="r_foto" accept="image/*">

<button id="btnRegister" onclick="register()">DAFTAR</button>
<div class="link" onclick="showLogin()">Kembali ke Login</div>
</div>
</div>

<div id="dashboard" class="container hidden">

<div class="header" id="namaUser"></div>

<div class="card">
<div class="grid">
<button onclick="window.location.href='orderojek.html'">ORDER OJEK</button>
<button>ORDER MAKANAN</button>
<button>ORDER KURIR</button>
<button>RIWAYAT ORDER</button>
<button onclick="bantuan()">BANTUAN</button>
<button onclick="window.location.href='profile.html'">PROFILE</button>
</div>

<div class="map">
<iframe id="mapFrame"></iframe>
</div>

</div>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<p id="modalText"></p>
<button onclick="closeModal()">OK</button>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const logo = document.getElementById("logo")
const loginPage = document.getElementById("login")
const registerPage = document.getElementById("register")
const dashboard = document.getElementById("dashboard")

let userData = null

window.showModal = (msg)=>{
    document.getElementById("modalText").innerText = msg
    document.getElementById("modal").style.display="flex"
}
window.closeModal = ()=>document.getElementById("modal").style.display="none"

window.showLogin = ()=>{
    registerPage.classList.add("hidden")
    loginPage.classList.remove("hidden")
}

window.showRegister = ()=>{
    loginPage.classList.add("hidden")
    registerPage.classList.remove("hidden")
}

setTimeout(checkSession,3000)

async function checkSession(){
    logo.style.display="none"

    const token = localStorage.getItem("token")
    if(!token){
        loginPage.classList.remove("hidden")
        return
    }

    const { data } = await supabase.rpc("cek_session",{p_token:token})

    if(!data || data.length===0 || data[0].role !== "user"){
        localStorage.removeItem("token")
        localStorage.removeItem("user_id") // Pastikan bersih
        loginPage.classList.remove("hidden")
        return
    }

    // PERBAIKAN: Pastikan user_id juga ter-set saat reload dari sesi aktif
    localStorage.setItem("user_id", data[0].user_id)
    loadDashboard(data[0].user_id)
}

window.login = async ()=>{
    const wa = login_wa.value.trim()
    const pass = login_pass.value.trim()
    const btn = btnLogin

    if(!wa || !pass){
        showModal("Semua field wajib diisi")
        return
    }

    btn.disabled=true
    btn.innerText="Loading..."

    const { data } = await supabase
    .from("users")
    .select("*")
    .eq("no_wa",wa)
    .eq("password",pass)
    .maybeSingle()

    if(!data){
        showModal("Nomor / password salah")
        resetBtn(btn)
        return
    }

    const { data:token } = await supabase.rpc("login_session",{
        p_user_id:data.id,
        p_role:"user",
        p_device:navigator.userAgent
    })

    localStorage.setItem("token",token)
    // PERBAIKAN: Simpan user_id untuk digunakan di orderojek.html
    localStorage.setItem("user_id", data.id) 
    
    loadDashboard(data.id)
}

function resetBtn(btn){
    btn.disabled=false
    btn.innerText="LOGIN"
}

async function loadDashboard(id){
    loginPage.classList.add("hidden")
    dashboard.classList.remove("hidden")

    const { data } = await supabase
    .from("users")
    .select("*")
    .eq("id",id)
    .maybeSingle()

    userData = data

    document.getElementById("namaUser").innerText = "Halo, "+(data?.nama || "User")

    loadMap()
}

window.logout = async ()=>{
    const token = localStorage.getItem("token")
    if (token) {
        await supabase.rpc("logout_session",{p_token:token})
    }
    localStorage.removeItem("token")
    localStorage.removeItem("user_id") // Bersihkan juga user_id
    location.reload()
}

// ================= MAP =================
function loadMap(){
    if(!navigator.geolocation){
        showModal("GPS tidak tersedia")
        return
    }

    navigator.geolocation.getCurrentPosition(pos=>{
        const lat = pos.coords.latitude
        const lng = pos.coords.longitude

        // PERBAIKAN: URL Embed Maps yang valid dan penulisan variabel yang benar
        document.getElementById("mapFrame").src = 
        `https://maps.google.com/maps?q=${lat},${lng}&hl=id&z=15&output=embed`
    })
}

// ================= REGISTER =================
function compress(file){
    return new Promise(resolve=>{
        const img = new Image()
        const reader = new FileReader()
        reader.onload = e => img.src = e.target.result
        img.onload = ()=>{
            const canvas = document.createElement("canvas")
            const scale = 800 / img.width
            canvas.width = 800
            canvas.height = img.height * scale

            const ctx = canvas.getContext("2d")
            ctx.drawImage(img,0,0,canvas.width,canvas.height)

            canvas.toBlob(b=>resolve(b),"image/jpeg",0.7)
        }
        reader.readAsDataURL(file)
    })
}

async function upload(file){
    const blob = await compress(file)
    const fileName = Date.now()+".jpg"

    await supabase.storage.from("data-ojek").upload(fileName,blob)

    return fileName
}

window.register = async ()=>{
    const btn = btnRegister

    const nama = r_nama.value.trim()
    const alamat = r_alamat.value.trim()
    const wa = r_wa.value.trim()
    const pass = r_pass.value.trim()
    const foto = r_foto.files[0]

    if(!nama || !alamat || !wa || !pass || !foto){
        showModal("Semua data wajib diisi")
        return
    }

    btn.disabled=true
    btn.innerText="Loading..."

    const { data:cek } = await supabase
    .from("users")
    .select("id")
    .eq("no_wa",wa)
    .maybeSingle()

    if(cek){
        showModal("Nomor sudah terdaftar")
        btn.disabled=false
        btn.innerText="DAFTAR"
        return
    }

    try{
        const file = await upload(foto)

        await supabase.from("users").insert({
            nama,
            alamat,
            no_wa:wa,
            password:pass,
            foto:file,
            status:"pending"
        })

        showModal("Berhasil daftar")
        showLogin()

    }catch{
        showModal("Upload gagal")
    }

    btn.disabled=false
    btn.innerText="DAFTAR"
}

window.bantuan = ()=>{
    showModal("Hubungi admin jika ada kendala login")
}

})
</script>

</body>
</html>
